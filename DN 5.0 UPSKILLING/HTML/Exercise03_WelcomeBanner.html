<!DOCTYPE html>
<html>
<head>
    <title>Welcome Message Styling</title>

    <style>
        #welcomeBanner {
            background-color: rgb(114, 114, 116);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: rgb(139, 139, 138);
            font-weight: bold;
            text-align: center;

        }
    </style>
</head>

<body>

    <div id="welcomeBanner">
        <h2 class="highlight">Welcome, User!</h2>
        <p>You are successfully logged in.</p>
        <p>
            <span style="color: red; font-weight: bold;">
                Special Offer: 50% Discount!
            </span>
        </p>
    </div>

    <p class="highlight">Limited time offer available now.</p>

</body>
</html>
